# CI for Perspective.
#
# Runs on every push and every pull request. Fails the run if typecheck,
# lint, tests, or production build break.
#
# Env vars: the Next build inlines NEXT_PUBLIC_* values at compile time and
# crashes if a `process.env.X!` non-null assertion is undefined. We feed
# them harmless placeholders here so the build can complete — CI is about
# catching code regressions, not exercising the real Supabase or TMDB.
# Server-only secrets (SUPABASE_SERVICE_ROLE_KEY, TMDB_ACCESS_TOKEN) aren't
# read during build, so they stay unset.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs of the same branch when a new push lands — saves
# minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Placeholders — the URL must look like a real one or @supabase/ssr
      # throws at module-load. Anon key just needs to be a non-empty string.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Matches the `packageManager` field in package.json.
          version: 9.15.9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
